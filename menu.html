<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sipster Menu — View Our Fresh Menu</title>
  <meta name="description" content="View Sipster's full menu. Fresh juices, smoothies, salads, and signature creations.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='25' y='25' width='50' height='50' rx='10' fill='%23F28F00'/><line x1='50' y1='25' x2='65' y2='10' stroke='%234E7A3E' stroke-width='8'/><rect x='20' y='21' width='60' height='6' fill='%234E7A3E'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #1a2e14 0%, #2d4a22 30%, #1a2e14 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    /* Animated background particles */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(242, 143, 0, 0.15), transparent),
        radial-gradient(2px 2px at 40% 70%, rgba(242, 143, 0, 0.1), transparent),
        radial-gradient(2px 2px at 80% 40%, rgba(78, 122, 62, 0.2), transparent),
        radial-gradient(3px 3px at 60% 80%, rgba(242, 143, 0, 0.08), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 28px 20px 20px;
      background: rgba(26, 46, 20, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(78, 122, 62, 0.3);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .brand svg { width: 44px; height: 44px; }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 800;
      color: #F28F00;
      letter-spacing: -0.5px;
    }

    .tagline {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .pdf-wrapper {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    .pdf-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(78, 122, 62, 0.25);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      min-height: 70vh;
    }

    .pdf-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: rgba(45, 74, 34, 0.5);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(78, 122, 62, 0.2);
    }

    .pdf-title {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
    }

    .pdf-actions { display: flex; gap: 10px; }

    .pdf-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid rgba(242, 143, 0, 0.4);
      border-radius: 8px;
      background: rgba(242, 143, 0, 0.1);
      color: #F28F00;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .pdf-btn:hover {
      background: #F28F00;
      color: #1a2e14;
      border-color: #F28F00;
      transform: translateY(-1px);
    }

    .pdf-btn svg { width: 16px; height: 16px; }

    .pdf-embed-container {
      flex: 1;
      position: relative;
      background: #0f1a0c;
    }

    .pdf-embed-container iframe,
    .pdf-embed-container embed,
    .pdf-embed-container object {
      width: 100%;
      height: 100%;
      border: none;
      min-height: 65vh;
    }

    /* Fallback for mobile browsers that can't render PDF inline */
    .mobile-fallback {
      display: none;
      text-align: center;
      padding: 60px 30px;
    }

    .mobile-fallback .fallback-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(242, 143, 0, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mobile-fallback .fallback-icon svg {
      width: 36px;
      height: 36px;
      color: #F28F00;
    }

    .mobile-fallback h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      margin-bottom: 12px;
      color: #fff;
    }

    .mobile-fallback p {
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .mobile-fallback .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      background: linear-gradient(135deg, #F28F00, #e07d00);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'Outfit', sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(242, 143, 0, 0.3);
      transition: all 0.3s ease;
    }

    .mobile-fallback .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(242, 143, 0, 0.4);
    }

    .mobile-fallback .download-btn svg { width: 20px; height: 20px; }

    .footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .footer a {
      color: #F28F00;
      text-decoration: none;
    }

    /* Show fallback on mobile */
    @media (max-width: 768px) {
      .pdf-embed-container { display: none; }
      .mobile-fallback { display: block; }
      .pdf-toolbar { justify-content: center; }
      .pdf-title { display: none; }
      .header { padding: 22px 16px 16px; }
      .brand-name { font-size: 28px; }
      .pdf-wrapper { padding: 16px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="brand">
      <svg viewBox="0 0 100 100">
        <rect x="25" y="30" width="50" height="55" rx="8" fill="#F28F00" />
        <line x1="50" y1="30" x2="65" y2="10" stroke="#4E7A3E" stroke-width="8" stroke-linecap="round"/>
        <rect x="20" y="24" width="60" height="6" fill="#4E7A3E" rx="3" />
      </svg>
      <span class="brand-name">sipster</span>
    </div>
    <p class="tagline">Juices &bull; Smoothies &bull; Salads</p>
  </header>

  <div class="pdf-wrapper">
    <div class="pdf-card">
      <div class="pdf-toolbar">
        <span class="pdf-title">📄 Sipster Menu</span>
        <div class="pdf-actions">
          <a class="pdf-btn" href="sipster%20menu.pdf" download>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Download PDF
          </a>
          <a class="pdf-btn" href="index.html">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Digital Menu
          </a>
        </div>
      </div>

      <!-- PDF Viewer for Desktop -->
      <div class="pdf-embed-container">
        <iframe src="sipster%20menu.pdf" title="Sipster Menu PDF"></iframe>
      </div>

      <!-- Fallback for Mobile (most mobile browsers can't render PDF inline) -->
      <div class="mobile-fallback">
        <div class="fallback-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <h2>Our Fresh Menu</h2>
        <p>Tap the button below to view or download our complete menu with juices, smoothies, salads, and signature creations.</p>
        <a class="download-btn" href="sipster%20menu.pdf" target="_blank">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          View Menu PDF
        </a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 Sipster &mdash; Fire Service Lane, Baramulla | <a href="index.html">Browse Digital Menu</a></p>
  </footer>

</body>
</html>
